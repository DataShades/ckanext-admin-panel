{% ckan_extends %}

{% block header_account_profile %}
    {% if h.check_access('admin_panel_access') %}
           <li>
            <a href="{{ h.url_for('ap_support_admin.list') }}" title="{{ _('Dashboard') }}">
                <i class="fa fa-ticket"></i>
                <span class="text">{{ _('Dashboard') }}</span>
            </a>
        </li>
    {% else %}
        <li>
            <a href="{{ h.url_for('ap_support.my_tickets') }}" title="{{ _('My Support Requests') }}">
                <i class="fa fa-ticket"></i>
                <span class="text">{{ _('My Support Requests') }}</span>
            </a>
        </li>
    {% endif %}

    <li>
        <a
            href="#"
            title="{{ _('Support') }}"
            data-bs-toggle="modal"
            data-bs-target="#create-ticket-modal"
            {#} the modal is in page.html {#}
            hx-get="{{ h.url_for('ap_support.init_modal') }}"
            hx-target=".ap-ticket-data"
            hx-trigger="click">
            <i class="fa fa-question-circle"></i>
        </a>
    </li>

    {{ super() }}
{% endblock %}
